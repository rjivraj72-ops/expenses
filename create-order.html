
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5c4a3a">
<title>Granola Kid - Production Order</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    background: #f5f0eb; color: #3b2e24;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }
  .header-area {
    background: linear-gradient(180deg, #e8ddd2 0%, #f5f0eb 100%);
    margin: -16px -16px 16px -16px; padding: 16px 16px 16px;
    border-radius: 0 0 20px 20px; text-align: center;
  }
  h1 { font-size: 24px; font-weight: 700; color: #5c4a3a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8a7968; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(60,46,36,0.06), 0 1px 3px rgba(60,46,36,0.04); }
  .card-title { font-size: 15px; font-weight: 600; color: #5c4a3a; margin-bottom: 10px; }
  input, select { font-size: 16px; padding: 12px; border: 1px solid #d4c8bc; border-radius: 10px; background: #faf7f4; width: 100%; color: #3b2e24; -webkit-appearance: none; margin-bottom: 8px; }
  input:focus { outline: none; border-color: #8b6f4e; }
  .sku-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .sku-item { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  .sku-item input { width: 50px; text-align: center; padding: 8px; margin: 0; font-weight: 700; font-size: 16px; -moz-appearance: textfield; }
  .sku-item input::-webkit-outer-spin-button, .sku-item input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .sku-label { font-size: 13px; flex: 1; }
  button { font-size: 16px; font-weight: 600; padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #8b6f4e; color: #fff; width: 100%; transform: scale(1); transition: transform 0.1s; }
  button:active { transform: scale(0.95); }
  .add-btn { background: #5a8a5e; margin-top: 4px; }
  .total-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid #e8ddd2; font-size: 15px; }
  .total-row:last-child { border-bottom: none; }
  .total-name { font-weight: 500; }
  .total-qty { font-weight: 700; color: #5c4a3a; }
  .order-log { font-size: 12px; color: #8a7968; margin-bottom: 10px; }
  .order-log div { padding: 4px 0; border-bottom: 0.5px solid #e8ddd2; }
  .order-log div:last-child { border-bottom: none; }
  .preview { background: #faf7f4; border-radius: 10px; padding: 12px; font-size: 14px; color: #3b2e24; white-space: pre-line; margin-bottom: 12px; line-height: 1.6; -webkit-user-select: all; user-select: all; }
  .back-link { display: block; text-align: center; color: #8b6f4e; font-size: 13px; text-decoration: none; padding: 12px 0; }
  .footer { text-align: center; color: #c4b5a5; font-size: 12px; padding: 20px 0 10px; }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #5c4a3a; color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 500; z-index: 300; opacity: 0;
    animation: toastIn 0.3s ease forwards, toastOut 0.3s ease 1.5s forwards;
  }
  @keyframes toastIn { to { opacity: 1; } }
  @keyframes toastOut { to { opacity: 0; } }
  .reset-btn { background: #e8ddd2; color: #5c4a3a; font-size: 13px; padding: 10px; margin-top: 8px; }
</style>
</head>
<body>
<div class="header-area">
  <h1>📋 Production Order</h1>
  <div class="subtitle">Weekly order for Haley · Due Monday 5pm PT</div>
</div>

<div class="card" style="text-align:center">
  <a href="https://thegranolakid.myshopify.com/admin/orders" target="_blank" style="display:block;background:#5a8a5e;color:#fff;text-decoration:none;font-size:16px;font-weight:600;padding:14px;border-radius:10px">🛍️ Open Shopify Orders</a>
</div>

<div class="card">
  <div class="card-title">📦 Add Customer Order</div>
  <input id="customer" placeholder="Customer Name" required>
  <div class="sku-grid">
    <div class="sku-item"><span class="sku-label">🥣 Naked</span><input type="number" min="0" inputmode="numeric" data-sku="Naked" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🥜 GoNuts</span><input type="number" min="0" inputmode="numeric" data-sku="GoNuts" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🥥 CocoYummy</span><input type="number" min="0" inputmode="numeric" data-sku="CocoYummy" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🫐 CranCinny</span><input type="number" min="0" inputmode="numeric" data-sku="CranCinny Bliss" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🍫 Dark&Dreamy</span><input type="number" min="0" inputmode="numeric" data-sku="Dark & Dreamy" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">📦 Bulk</span><input type="number" min="0" inputmode="numeric" data-sku="Bulk Container" placeholder="0"></div>
  </div>
  <button class="add-btn" onclick="addOrder()">+ Add to Order</button>
</div>

<div class="card" id="totals-card" style="display:none">
  <div class="card-title">📊 Running Total</div>
  <div id="orderLog" class="order-log"></div>
  <div id="totals"></div>
  <button class="reset-btn" onclick="resetAll()">🔄 Start Over</button>
</div>

<div class="card" id="send-card" style="display:none">
  <div class="preview" id="preview"></div>
  <button onclick="sendWhatsApp()" style="background:#25D366;margin-bottom:8px">💬 Send via WhatsApp</button>
</div>

<a class="back-link" href="index.html">← Back to Granola Kid</a>
<div class="footer">Made with 🌾 by Granola Kid</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyTeqbHXcfc1aOKpZd3dFzbjQrKcKjhF2UjEDa0jhIp8dz7IEYQY9ZtDVmuEGMY6Qr0/exec";
const skus = ["Naked","GoNuts","CocoYummy","CranCinny Bliss","Dark & Dreamy","Bulk Container"];
const totals = {};
const orders = [];
skus.forEach(s => totals[s] = 0);

function getInput(sku) { return document.querySelector(`[data-sku="${sku}"]`); }

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function addOrder() {
  const name = document.getElementById("customer").value.trim();
  if (!name) { showToast("Enter customer name"); return; }

  let hasQty = false;
  const order = { name, items: {} };
  skus.forEach(s => {
    const qty = parseInt(getInput(s).value) || 0;
    if (qty > 0) { totals[s] += qty; order.items[s] = qty; hasQty = true; }
  });

  if (!hasQty) { showToast("Enter at least one quantity"); return; }

  orders.push(order);
  document.getElementById("customer").value = "";
  skus.forEach(s => getInput(s).value = "");

  render();
  showToast(`✓ ${name} added`);
}

function render() {
  const hasOrders = orders.length > 0;
  document.getElementById("totals-card").style.display = hasOrders ? "block" : "none";
  document.getElementById("send-card").style.display = hasOrders ? "block" : "none";

  document.getElementById("orderLog").innerHTML = orders.map(o => {
    const items = Object.entries(o.items).map(([s, q]) => `${s} ×${q}`).join(", ");
    return `<div><strong>${o.name}:</strong> ${items}</div>`;
  }).join("");

  document.getElementById("totals").innerHTML = skus
    .filter(s => totals0)
    .map(s => `<div class="total-row"><span class="total-name">${s}</span><span class="total-qty">${totals[s]}</span></div>`)
    .join("");

  let msg = "Hi Haley, here is the weekly order:\n\n";
  orders.forEach(o => {
    const items = Object.entries(o.items).map(([s, q]) => `${s} ×${q}`).join(", ");
    msg += `${o.name}: ${items}\n\n`;
  });
  msg += "\n--- Total ---\n";
  skus.forEach(s => { msg += `${s} - ${totals[s]}\n`; });
  document.getElementById("preview").textContent = msg.trim();
}

function resetAll() {
  if (!confirm("Start over? This clears all orders.")) return;
  orders.length = 0;
  skus.forEach(s => totals[s] = 0);
  render();
  showToast("Cleared");
}

async function saveOrder() {
  await fetch(API, {
    method: "POST", redirect: "follow",
    body: JSON.stringify({
      pin: "040411", action: "order",
      date: new Date().toISOString().split("T")[0],
      Naked: totals["Naked"], GoNuts: totals["GoNuts"],
      CocoYummy: totals["CocoYummy"], CranCinnyBliss: totals["CranCinny Bliss"],
      DarkDreamy: totals["Dark & Dreamy"], BulkContainer: totals["Bulk Container"]
    })
  });
  showToast("✓ Order saved to sheet");
}

function sendWhatsApp() {
  let msg = "Hi Haley, here is the weekly order:\n\n";
  orders.forEach(o => {
    const items = Object.entries(o.items).map(([s, q]) => `${s} ×${q}`).join(", ");
    msg += `${o.name}: ${items}\n\n`;
  });
  msg += "\n--- Total ---\n";
  skus.forEach(s => { msg += `${s} - ${totals[s]}\n`; });
  msg = msg.trim();

  saveOrder();
  window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
}
</script>
</body>
</html>
