<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f2f2f7" id="metaTheme">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Granola Kid - Production Order</title>
<script>
(function() {
  var accents = ['#007aff','#5856d6','#af52de','#ff2d55','#ff9500','#34c759','#00c7be'];
  var accent = accents[new Date().getDay()];
  var light = { accent:accent, dark:"#1c1c1e", text:"#1c1c1e", muted:"#8e8e93", bg:"#f2f2f7", input:"#ffffff", border:"#eeeeee", header:"#f9f9fb", divider:"#eeeeee", card:"#ffffff" };
  var dark  = { accent:accent, dark:"#ffffff", text:"#ffffff", muted:"#8e8e93", bg:"#000000", input:"#1c1c1e", border:"#3a3a3c", header:"#0a0a0a", divider:"#2c2c2e", card:"#1c1c1e" };
  var stored = localStorage.getItem("gk-dark");
  var isDark = stored !== null ? stored === "1" : window.matchMedia("(prefers-color-scheme: dark)").matches;
  var mode = isDark ? dark : light;
  var r = document.documentElement;
  if (isDark) r.classList.add("dark");
  Object.keys(mode).forEach(function(k) { r.style.setProperty("--" + k, mode[k]); });
  document.getElementById("metaTheme").setAttribute("content", isDark ? "#1c1c1e" : "#f2f2f7");
})();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { touch-action: manipulation; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }
  .header-area {
    background: var(--bg); margin: -16px -16px 12px -16px;
    padding: 14px 16px; border-bottom: 1px solid var(--border); text-align: center;
  }
  h1 { font-size: 1.1rem; font-weight: 900; color: var(--text); margin-bottom: 3px; }
  .subtitle { font-size: 0.65rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .card-title { font-size: 0.75rem; font-weight: 800; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select { font-size: 0.9rem; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--input); width: 100%; color: var(--text); -webkit-appearance: none; margin-bottom: 8px; }
  input:focus { outline: none; border-color: var(--accent); }
  .sku-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .sku-item { display: flex; align-items: center; gap: 6px; }
  .sku-item input { width: 48px; text-align: center; padding: 8px 4px; margin: 0; font-weight: 900; font-size: 0.9rem; -moz-appearance: textfield; }
  .sku-item input::-webkit-outer-spin-button, .sku-item input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .sku-label { font-size: 0.75rem; font-weight: 600; flex: 1; color: var(--text); }
  button { font-size: 0.85rem; font-weight: 700; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: var(--accent); color: #fff; width: 100%; transition: transform 0.1s; touch-action: manipulation; }
  button:active { transform: scale(0.96); }
  .add-btn { margin-top: 4px; }
  .total-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .total-row:last-child { border-bottom: none; }
  .total-name { font-weight: 600; color: var(--text); }
  .total-qty { font-weight: 900; color: var(--accent); }
  .order-log { font-size: 0.7rem; color: var(--muted); margin-bottom: 10px; }
  .order-log div { padding: 4px 0; border-bottom: 1px solid var(--border); }
  .order-log div:last-child { border-bottom: none; }
  .preview { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 0.8rem; color: var(--text); white-space: pre-line; margin-bottom: 10px; line-height: 1.6; -webkit-user-select: all; user-select: all; }
  .back-link { display: block; text-align: center; color: var(--accent); font-size: 0.75rem; font-weight: 700; text-decoration: none; padding: 12px 0; }
  .footer { text-align: center; color: var(--muted); font-size: 0.65rem; padding: 16px 0 10px; }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--dark); color: var(--bg); padding: 10px 20px; border-radius: 10px;
    font-size: 0.8rem; font-weight: 700; z-index: 300; opacity: 0;
    animation: toastIn 0.3s ease forwards, toastOut 0.3s ease 1.5s forwards;
  }
  @keyframes toastIn { to { opacity: 1; } }
  @keyframes toastOut { to { opacity: 0; } }
  .reset-btn { background: var(--input); color: var(--text); font-size: 0.75rem; padding: 9px; margin-top: 8px; border: 1px solid var(--border); }
  .shopify-btn { display: block; background: var(--accent); color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 700; padding: 12px; border-radius: 10px; text-align: center; transition: transform 0.1s; }
  .shopify-btn:active { transform: scale(0.96); }
  .whatsapp-btn { background: #25D366; margin-bottom: 8px; }
  .pin-screen { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .pin-screen h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .pin-dots { display: flex; gap: 12px; margin: 16px 0 24px; }
  .pin-dots .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: all 0.2s; }
  .pin-dots .dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dots.wrong { animation: shake 0.4s; }
  .pin-dots.wrong .dot.filled { background: #ff3b30; border-color: #ff3b30; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 76px); gap: 12px; }
  .pin-pad button { width: 76px; height: 76px; border-radius: 50%; font-size: 26px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
  .pin-pad .pin-empty { visibility: hidden; }
  .pin-pad .pin-del { font-size: 20px; }
</style>
</head>
<body>
<div id="pin-screen" class="pin-screen">
  <h2>🌾 Granola Kid</h2>
  <p id="pinMsg" style="color:var(--muted);font-size:14px">Enter PIN to create orders</p>
  <div class="pin-dots" id="pinDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="pin-pad">
    <button onclick="pinKey(1)">1</button><button onclick="pinKey(2)">2</button><button onclick="pinKey(3)">3</button>
    <button onclick="pinKey(4)">4</button><button onclick="pinKey(5)">5</button><button onclick="pinKey(6)">6</button>
    <button onclick="pinKey(7)">7</button><button onclick="pinKey(8)">8</button><button onclick="pinKey(9)">9</button>
    <button class="pin-empty"></button><button onclick="pinKey(0)">0</button><button class="pin-del" onclick="pinDel()">⌫</button>
  </div>
</div>
<div id="app" style="display:none">
<div class="header-area">
  <h1>📋 Production Order</h1>
  <div class="subtitle">Weekly order for Haley · Due Monday 5pm PT</div>
</div>

<div class="card" style="text-align:center">
  <a class="shopify-btn" href="https://thegranolakid.myshopify.com/admin/orders" target="_blank" rel="noopener">🛍️ Open Shopify Orders</a>
</div>

<div class="card">
  <div class="card-title">📦 Add Customer Order</div>
  <input id="customer" placeholder="Customer Name" required>
  <div class="sku-grid">
    <div class="sku-item"><span class="sku-label">🥣 Naked</span><input type="number" min="0" inputmode="numeric" data-sku="Naked" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🥜 GoNuts</span><input type="number" min="0" inputmode="numeric" data-sku="GoNuts" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🥥 CocoYummy</span><input type="number" min="0" inputmode="numeric" data-sku="CocoYummy" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🫐 CranCinny</span><input type="number" min="0" inputmode="numeric" data-sku="CranCinny Bliss" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">🍫 Dark&Dreamy</span><input type="number" min="0" inputmode="numeric" data-sku="Dark & Dreamy" placeholder="0"></div>
    <div class="sku-item"><span class="sku-label">📦 Bulk</span><input type="number" min="0" inputmode="numeric" data-sku="Bulk Container" placeholder="0"></div>
  </div>
  <button class="add-btn" onclick="addOrder()">+ Add to Order</button>
</div>

<div class="card" id="totals-card" style="display:none">
  <div class="card-title">📊 Running Total</div>
  <div id="orderLog" class="order-log"></div>
  <div id="totals"></div>
  <button class="reset-btn" onclick="resetAll()">🔄 Start Over</button>
</div>

<div class="card" id="send-card" style="display:none">
  <div class="preview" id="preview"></div>
  <button class="whatsapp-btn" onclick="sendWhatsApp()">💬 Send via WhatsApp</button>
</div>

<a class="back-link" href="index.html">← Back to Granola Kid</a>
<div class="footer">Made with 🌾 by Granola Kid</div>
</div>

<script>
document.addEventListener("touchstart", e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener("touchmove", e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("gesturechange", e => e.preventDefault());
document.addEventListener("gestureend", e => e.preventDefault());

const API = "https://script.google.com/macros/s/AKfycbyTeqbHXcfc1aOKpZd3dFzbjQrKcKjhF2UjEDa0jhIp8dz7IEYQY9ZtDVmuEGMY6Qr0/exec";
const skus = ["Naked","GoNuts","CocoYummy","CranCinny Bliss","Dark & Dreamy","Bulk Container"];
const totals = {};
const orders = [];
let validatedPin = "";
let pinEntry = "";
let pinFails = 0;
let pinLocked = false;
skus.forEach(s => totals[s] = 0);

function getInput(sku) { return document.querySelector(`[data-sku="${sku}"]`); }
function esc(s) { const d = document.createElement("div"); d.textContent = String(s || ""); return d.innerHTML; }
function unlockApp(pin) {
  validatedPin = pin;
  sessionStorage.setItem("gk-auth-pin", pin);
  document.getElementById("pin-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

async function validatePin(pin) {
  const res = await fetch(API, {
    method: "POST", redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "fetch", pin })
  });
  if (!res.ok) return false;
  const json = await res.json();
  return !json.error;
}

async function pinKey(n) {
  if (pinLocked || pinEntry.length >= 6) return;
  pinEntry += n;
  updateDots();
  if (pinEntry.length !== 6) return;
  try {
    if (await validatePin(pinEntry)) {
      unlockApp(pinEntry);
      return;
    }
  } catch {}
  pinFails++;
  document.getElementById("pinDots").classList.add("wrong");
  setTimeout(() => {
    pinEntry = "";
    updateDots();
    document.getElementById("pinDots").classList.remove("wrong");
  }, 500);
  if (pinFails >= 5) {
    pinLocked = true;
    let sec = 30;
    const msg = document.getElementById("pinMsg");
    const origText = msg.textContent;
    msg.textContent = "Too many attempts. Try again in 30s";
    const iv = setInterval(() => {
      sec--;
      msg.textContent = `Too many attempts. Try again in ${sec}s`;
      if (sec <= 0) {
        clearInterval(iv);
        pinLocked = false;
        pinFails = 0;
        msg.textContent = origText;
      }
    }, 1000);
  }
}

function pinDel() {
  if (pinLocked) return;
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
}

function updateDots() {
  document.querySelectorAll("#pinDots .dot").forEach((d, i) => d.classList.toggle("filled", i < pinEntry.length));
}

document.addEventListener("keydown", e => {
  if (document.getElementById("pin-screen").style.display === "none") return;
  if (e.key >= "0" && e.key <= "9") pinKey(parseInt(e.key));
  else if (e.key === "Backspace") pinDel();
});

(async function restoreSession() {
  const pin = sessionStorage.getItem("gk-auth-pin");
  if (!pin) return;
  try {
    if (await validatePin(pin)) unlockApp(pin);
    else sessionStorage.removeItem("gk-auth-pin");
  } catch {
    sessionStorage.removeItem("gk-auth-pin");
  }
})();

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function addOrder() {
  const name = document.getElementById("customer").value.trim();
  if (!name) { showToast("Enter customer name"); return; }

  let hasQty = false;
  const order = { name, items: {} };
  skus.forEach(s => {
    const qty = parseInt(getInput(s).value) || 0;
    if (qty > 0) { totals[s] += qty; order.items[s] = qty; hasQty = true; }
  });

  if (!hasQty) { showToast("Enter at least one quantity"); return; }

  orders.push(order);
  document.getElementById("customer").value = "";
  skus.forEach(s => getInput(s).value = "");

  render();
  showToast(`✓ ${name} added`);
}

function render() {
  const hasOrders = orders.length > 0;
  document.getElementById("totals-card").style.display = hasOrders ? "block" : "none";
  document.getElementById("send-card").style.display = hasOrders ? "block" : "none";

  document.getElementById("orderLog").innerHTML = orders.map(o => {
    const items = Object.entries(o.items).map(([s, q]) => `${esc(s)} ×${q}`).join(", ");
    return `<div><strong>${esc(o.name)}:</strong> ${items}</div>`;
  }).join("");

  document.getElementById("totals").innerHTML = skus
    .filter(s => totals[s] > 0)
    .map(s => `<div class="total-row"><span class="total-name">${s}</span><span class="total-qty">${totals[s]}</span></div>`)
    .join("");

  let msg = "Hi Haley, here is the weekly order:\n\n";
  orders.forEach(o => {
    const items = Object.entries(o.items).map(([s, q]) => `${s} ×${q}`).join(", ");
    msg += `${o.name}: ${items}\n\n`;
  });
  msg += "\n--- Total ---\n";
  skus.forEach(s => { msg += `${s} - ${totals[s]}\n`; });
  document.getElementById("preview").textContent = msg.trim();
}

function resetAll() {
  if (!confirm("Start over? This clears all orders.")) return;
  orders.length = 0;
  skus.forEach(s => totals[s] = 0);
  render();
  showToast("Cleared");
}

async function saveOrder() {
  if (!validatedPin) throw new Error("PIN required");
  const res = await fetch(API, {
    method: "POST", redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      pin: validatedPin, action: "order",
      date: new Date().toISOString().split("T")[0],
      Naked: totals["Naked"], GoNuts: totals["GoNuts"],
      CocoYummy: totals["CocoYummy"], CranCinnyBliss: totals["CranCinny Bliss"],
      DarkDreamy: totals["Dark & Dreamy"], BulkContainer: totals["Bulk Container"]
    })
  });
  if (!res.ok) throw new Error("Order save failed");
  showToast("✓ Order saved to sheet");
}

async function sendWhatsApp() {
  let msg = "Hi Haley, here is the weekly order:\n\n";
  orders.forEach(o => {
    const items = Object.entries(o.items).map(([s, q]) => `${s} ×${q}`).join(", ");
    msg += `${o.name}: ${items}\n\n`;
  });
  msg += "\n--- Total ---\n";
  skus.forEach(s => { msg += `${s} - ${totals[s]}\n`; });
  msg = msg.trim();

  try {
    await saveOrder();
  } catch {
    if (!confirm("The order could not be saved to the sheet. Send it anyway?")) return;
  }
  window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
}
</script>
</body>
</html>
