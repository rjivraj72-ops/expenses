<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f2f2f7" id="metaTheme">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Granola Kid - Production Order</title>
<script>
(function() {
  var accent = '#2f6f55';
  var light = { accent:accent, dark:"#1c1c1e", text:"#1f2420", muted:"#727a75", bg:"#f5f6f3", input:"#ffffff", border:"#e2e6df", header:"#f8f9f6", divider:"#e2e6df", card:"#ffffff" };
  var dark  = { accent:"#65b891", dark:"#ffffff", text:"#f7f8f5", muted:"#9aa39d", bg:"#101410", input:"#1b211c", border:"#323a34", header:"#151a16", divider:"#323a34", card:"#181e19" };
  var stored = localStorage.getItem("gk-dark");
  var isDark = stored !== null ? stored === "1" : window.matchMedia("(prefers-color-scheme: dark)").matches;
  var mode = isDark ? dark : light;
  var r = document.documentElement;
  if (isDark) r.classList.add("dark");
  Object.keys(mode).forEach(function(k) { r.style.setProperty("--" + k, mode[k]); });
  document.getElementById("metaTheme").setAttribute("content", isDark ? "#1c1c1e" : "#f2f2f7");
})();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { touch-action: manipulation; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }
  .header-area {
    background: var(--bg); margin: -16px -16px 12px -16px;
    padding: 14px 16px; border-bottom: 1px solid var(--border); text-align: center;
  }
  h1 { font-size: 1.1rem; font-weight: 900; color: var(--text); margin-bottom: 3px; }
  .subtitle { font-size: 0.65rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .card-title { font-size: 0.75rem; font-weight: 800; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, textarea { font-size: 0.9rem; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--input); width: 100%; color: var(--text); -webkit-appearance: none; margin-bottom: 8px; }
  textarea { min-height: 76px; resize: vertical; font-family: inherit; line-height: 1.4; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .mode-tabs { display: flex; gap: 6px; margin-top: 12px; }
  .mode-tabs a { flex: 1; text-align: center; text-decoration: none; padding: 9px 8px; border-radius: 10px; font-size: 0.82rem; font-weight: 800; color: var(--text); background: var(--input); border: 1px solid var(--border); }
  .mode-tabs a.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .week-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .week-box { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
  .week-box .label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
  .week-box .value { font-size: 0.9rem; font-weight: 900; color: var(--text); }
  .sku-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .sku-item { display: flex; align-items: center; gap: 6px; }
  .sku-item input { width: 48px; text-align: center; padding: 8px 4px; margin: 0; font-weight: 900; font-size: 0.9rem; -moz-appearance: textfield; }
  .sku-item input::-webkit-outer-spin-button, .sku-item input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .sku-label { font-size: 0.75rem; font-weight: 600; flex: 1; color: var(--text); }
  button { font-size: 0.85rem; font-weight: 700; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: var(--accent); color: #fff; width: 100%; transition: transform 0.1s; touch-action: manipulation; }
  button:active { transform: scale(0.96); }
  .add-btn { margin-top: 4px; }
  .total-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .total-row:last-child { border-bottom: none; }
  .total-name { font-weight: 600; color: var(--text); }
  .total-qty { font-weight: 900; color: var(--accent); }
  .order-log { font-size: 0.7rem; color: var(--muted); margin-bottom: 10px; }
  .order-log div { padding: 4px 0; border-bottom: 1px solid var(--border); }
  .order-log div:last-child { border-bottom: none; }
  .preview { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 0.8rem; color: var(--text); white-space: pre-line; margin-bottom: 10px; line-height: 1.6; -webkit-user-select: all; user-select: all; }
  .back-link { display: block; text-align: center; color: var(--accent); font-size: 0.75rem; font-weight: 700; text-decoration: none; padding: 12px 0; }
  .footer { text-align: center; color: var(--muted); font-size: 0.65rem; padding: 16px 0 10px; }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--dark); color: var(--bg); padding: 10px 20px; border-radius: 10px;
    font-size: 0.8rem; font-weight: 700; z-index: 300; opacity: 0;
    animation: toastIn 0.3s ease forwards, toastOut 0.3s ease 1.5s forwards;
  }
  @keyframes toastIn { to { opacity: 1; } }
  @keyframes toastOut { to { opacity: 0; } }
  .reset-btn { background: var(--input); color: var(--text); font-size: 0.75rem; padding: 9px; margin-top: 8px; border: 1px solid var(--border); }
  .shopify-btn { display: block; background: var(--accent); color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 700; padding: 12px; border-radius: 10px; text-align: center; transition: transform 0.1s; }
  .shopify-btn:active { transform: scale(0.96); }
  .whatsapp-btn { background: #25D366; margin-bottom: 8px; }
  .copy-btn { background: var(--input); color: var(--text); border: 1px solid var(--border); margin-bottom: 8px; }
  .button-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .pin-screen { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .pin-screen h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .pin-dots { display: flex; gap: 12px; margin: 16px 0 24px; }
  .pin-dots .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: all 0.2s; }
  .pin-dots .dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dots.wrong { animation: shake 0.4s; }
  .pin-dots.wrong .dot.filled { background: #ff3b30; border-color: #ff3b30; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 76px); gap: 12px; }
  .pin-pad button { width: 76px; height: 76px; border-radius: 50%; font-size: 26px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
  .pin-pad .pin-empty { visibility: hidden; }
  .pin-pad .pin-del { font-size: 20px; }
  /* Polished business-workflow layer */
  body { line-height: 1.35; }
  .header-area { padding: 16px; }
