
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5c4a3a">
<title>Granola Kid - Production Order</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    background: #f5f0eb; color: #3b2e24;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }
  .header-area {
    background: linear-gradient(180deg, #e8ddd2 0%, #f5f0eb 100%);
    margin: -16px -16px 16px -16px; padding: 16px 16px 16px;
    border-radius: 0 0 20px 20px; text-align: center;
  }
  h1 { font-size: 24px; font-weight: 700; color: #5c4a3a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8a7968; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(60,46,36,0.06), 0 1px 3px rgba(60,46,36,0.04); }
  .sku-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid #e8ddd2; }
  .sku-row:last-child { border-bottom: none; }
  .sku-name { font-size: 15px; font-weight: 500; flex: 1; }
  .sku-input { width: 80px; font-size: 18px; font-weight: 700; text-align: center; padding: 8px; border: 1px solid #d4c8bc; border-radius: 10px; background: #faf7f4; color: #3b2e24; -webkit-appearance: none; -moz-appearance: textfield; }
  .sku-input::-webkit-outer-spin-button, .sku-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .sku-input:focus { outline: none; border-color: #8b6f4e; }
  button { font-size: 16px; font-weight: 600; padding: 14px; border: none; border-radius: 10px; cursor: pointer; background: #8b6f4e; color: #fff; width: 100%; transform: scale(1); transition: transform 0.1s; }
  button:active { transform: scale(0.95); }
  .preview { background: #faf7f4; border-radius: 10px; padding: 12px; font-size: 14px; color: #3b2e24; white-space: pre-line; margin-bottom: 12px; line-height: 1.6; }
  .back-link { display: block; text-align: center; color: #8b6f4e; font-size: 13px; text-decoration: none; padding: 12px 0; }
  .footer { text-align: center; color: #c4b5a5; font-size: 12px; padding: 20px 0 10px; }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #5c4a3a; color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 500; z-index: 300; opacity: 0;
    animation: toastIn 0.3s ease forwards, toastOut 0.3s ease 1.5s forwards;
  }
  @keyframes toastIn { to { opacity: 1; } }
  @keyframes toastOut { to { opacity: 0; } }
</style>
</head>
<body>
<div class="header-area">
  <h1>📋 Production Order</h1>
  <div class="subtitle">Weekly order for Haley · Due Monday 5pm PT</div>
</div>

<div class="card">
  <div class="sku-row"><span class="sku-name">🥣 Naked</span><input class="sku-input" type="number" min="0" inputmode="numeric" data-sku="Naked" placeholder="0"></div>
  <div class="sku-row"><span class="sku-name">🥜 GoNuts</span><input class="sku-input" type="number" min="0" inputmode="numeric" data-sku="GoNuts" placeholder="0"></div>
  <div class="sku-row"><span class="sku-name">🥥 CocoYummy</span><input class="sku-input" type="number" min="0" inputmode="numeric" data-sku="CocoYummy" placeholder="0"></div>
  <div class="sku-row"><span class="sku-name">🫐 CranCinny Bliss</span><input class="sku-input" type="number" min="0" inputmode="numeric" data-sku="CranCinny Bliss" placeholder="0"></div>
  <div class="sku-row"><span class="sku-name">🍫 Dark & Dreamy</span><input class="sku-input" type="number" min="0" inputmode="numeric" data-sku="Dark & Dreamy" placeholder="0"></div>
  <div class="sku-row"><span class="sku-name">📦 Bulk Container</span><input class="sku-input" type="number" min="0" inputmode="numeric" data-sku="Bulk Container" placeholder="0"></div>
</div>

<div class="card">
  <div class="preview" id="preview">Enter quantities above to preview the message.</div>
  <button id="sendBtn" onclick="sendOrder()">📱 Send to Haley & Rahim</button>
</div>

<a class="back-link" href="index.html">← Back to Granola Kid</a>
<div class="footer">Made with 🌾 by Granola Kid</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyTeqbHXcfc1aOKpZd3dFzbjQrKcKjhF2UjEDa0jhIp8dz7IEYQY9ZtDVmuEGMY6Qr0/exec";
const inputs = document.querySelectorAll(".sku-input");
const preview = document.getElementById("preview");

inputs.forEach(inp => inp.addEventListener("input", updatePreview));

function getVal(sku) {
  const inp = document.querySelector(`[data-sku="${sku}"]`);
  return parseInt(inp?.value) || 0;
}

function buildMessage() {
  let msg = "Hi Haley, here is the weekly order:\n\n";
  inputs.forEach(inp => {
    const qty = inp.value || "0";
    msg += `${inp.dataset.sku} - ${qty}\n`;
  });
  return msg.trim();
}

function updatePreview() {
  preview.textContent = buildMessage();
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

async function sendOrder() {
  const btn = document.getElementById("sendBtn");
  btn.textContent = "Saving & Sending...";
  btn.disabled = true;

  // Save to Google Sheet
  await fetch(API, {
    method: "POST",
    redirect: "follow",
    body: JSON.stringify({
      pin: "040411",
      action: "order",
      date: new Date().toISOString().split("T")[0],
      Naked: getVal("Naked"),
      GoNuts: getVal("GoNuts"),
      CocoYummy: getVal("CocoYummy"),
      CranCinnyBliss: getVal("CranCinny Bliss"),
      DarkDreamy: getVal("Dark & Dreamy"),
      BulkContainer: getVal("Bulk Container")
    })
  });

  showToast("✓ Order saved to sheet");
  btn.textContent = "📱 Send to Haley & Rahim";
  btn.disabled = false;

  // Open iMessage
  const msg = buildMessage();
  const encoded = encodeURIComponent(msg);
  const numbers = "6047279676,7789994602";
  window.location.href = `sms:/open?addresses=${numbers}&body=${encoded}`;
}

updatePreview();
</script>
</body>
</html>
