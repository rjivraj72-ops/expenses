<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f2f2f7" id="metaTheme">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Granola Kid</title>
<script>
(function() {
  var accent = '#2f6f55';
  var light = { accent:accent, dark:"#1c1c1e", text:"#1f2420", muted:"#727a75", bg:"#f5f6f3", input:"#ffffff", border:"#e2e6df", header:"#f8f9f6", divider:"#e2e6df", card:"#ffffff" };
  var dark  = { accent:"#65b891", dark:"#ffffff", text:"#f7f8f5", muted:"#9aa39d", bg:"#101410", input:"#1b211c", border:"#323a34", header:"#151a16", divider:"#323a34", card:"#181e19" };
  var stored = localStorage.getItem("gk-dark");
  var isDark = stored !== null ? stored === "1" : window.matchMedia("(prefers-color-scheme: dark)").matches;
  var mode = isDark ? dark : light;
  var r = document.documentElement;
  if (isDark) r.classList.add("dark");
  Object.keys(mode).forEach(function(k) { r.style.setProperty("--" + k, mode[k]); });
  document.getElementById("metaTheme").setAttribute("content", isDark ? "#1c1c1e" : "#f2f2f7");
  window._gkLight = light; window._gkDark2 = dark; window._gkDark = isDark;
})();
</script>
<style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }
 #app { padding: 0 16px env(safe-area-inset-bottom); }
 .header-area { background: var(--bg); margin: -16px -16px 12px -16px; padding: 12px 16px 0; }
 .logo { padding: 10px 0 6px; }
 .summary { text-align: center; padding-bottom: 12px; }
 .summary .bal-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 12px; }
 .summary .bal-item { text-align: center; }
 .summary .bal-item .amt { font-size: 1.5rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
 .summary .bal-item .lbl { font-size: 0.75rem; color: var(--text); font-weight: 700; margin-top: 3px; }
 .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
 .stat-item { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 8px 6px; text-align: center; }
 .stat-val { font-size: 1rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
 .stat-lbl { font-size: 0.7rem; color: var(--text); font-weight: 600; margin-top: 2px; }
 .fulfilled-wrap { display: none; }
 .fulfilled-wrap.show { display: block; }
 .fulfilled-wrap label { font-size: 0.7rem; color: var(--muted); display: block; margin-bottom: 2px; }
 .week-alert { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; text-align: center; border: 1px solid var(--border); }
 .week-alert .wa-title { font-size: 0.75rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
 .week-alert .wa-amounts { font-size: 1.1rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
 .week-alert .wa-sep { color: var(--muted); margin: 0 6px; }
 .week-alert .wa-out { color: var(--text); }
 .week-alert .wa-in { color: var(--accent); }
 .week-alert .wa-overdue { font-size: 1.1rem; font-weight: 900; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
 .week-alert .wa-overdue-label { font-size: 0.8rem; font-weight: 800; color: var(--text); margin-right: 8px; }
 .week-alert .wa-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; margin-top: 8px; }
 .card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
 html.dark .card { border-color: var(--border); }
 html.dark .week-alert { border-color: var(--border); }
 html.dark .sticky-bar { box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
 form { display: flex; flex-direction: column; gap: 8px; }
 input, select { font-size: 0.9rem; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--input); width: 100%; color: var(--text); -webkit-appearance: none; }
 input:focus, select:focus { outline: none; border-color: var(--accent); }
 .row { display: flex; gap: 8px; }
 .row > * { flex: 1; }
 button { font-size: 0.85rem; font-weight: 700; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: var(--accent); color: #fff; width: 100%; transition: transform 0.1s; touch-action: manipulation; }
 button:active { transform: scale(0.96); }
 .toggle { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
 .toggle label { flex: 1; text-align: center; padding: 9px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: var(--input); color: var(--muted); transition: all 0.2s; }
 .toggle input { display: none; }
 .toggle input:checked + label { background: var(--accent); color: #fff; }
 .swipe-entry { position: relative; overflow: hidden; border-radius: 10px; margin-bottom: 6px; }
 .swipe-action { position: absolute; top: 0; bottom: 0; width: 90px; display: flex; align-items: center; font-weight: 700; font-size: 0.7rem; padding: 0 14px; opacity: 0; transition: opacity 0.15s; color: #fff; }
 .swipe-action-left { left: 0; background: var(--accent); }
 .swipe-action-right { right: 0; background: #ff3b30; justify-content: flex-end; }
 .swipe-entry.swiping-right .swipe-action-left { opacity: 1; }
 .swipe-entry.swiping-left .swipe-action-right { opacity: 1; }
 .entry { padding: 10px 12px; border-radius: 10px; cursor: pointer; position: relative; z-index: 1; background: var(--card); border: 1px solid var(--border); }
 .edit-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
 .edit-sheet { background: var(--card); width: 100%; max-width: 500px; border-radius: 16px 16px 0 0; padding: 20px 16px env(safe-area-inset-bottom); animation: sheetUp 0.25s ease-out; }
 .edit-sheet h3 { font-size: 0.9rem; font-weight: 800; color: var(--text); margin-bottom: 12px; text-align: center; }
 .edit-sheet form { display: flex; flex-direction: column; gap: 10px; }
 .edit-btns { display: flex; gap: 10px; }
 .edit-btns button { flex: 1; }
 .edit-btns .cancel { background: var(--input); color: var(--text); }
 @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
 .entry-top { display: flex; justify-content: space-between; align-items: center; }
 .entry-desc { font-size: 1rem; font-weight: 600; color: var(--text); }
 .entry-amount { font-size: 1rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
 .entry-amount.inc { color: var(--accent); }
 .entry-amount.exp { color: var(--text); }
 .entry-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 0.8rem; color: var(--muted); }
 .entry-actions { display: flex; gap: 6px; align-items: center; }
 .entry-actions button { background: none !important; border: none !important; font-size: 0.9rem; padding: 2px 4px; width: auto !important; color: var(--muted); font-weight: 400; min-width: 0; }
 .entry-actions .paid-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 5px; }
 .paid-badge.yes { background: var(--input); color: var(--accent); }
 .paid-badge.no { background: var(--input); color: var(--muted); cursor: pointer; border: 1px solid var(--border); }
 .due-badge { font-size: 0.68rem; font-weight: 800; padding: 3px 7px; border-radius: 6px; border: 1px solid var(--border); background: var(--input); color: var(--muted); white-space: nowrap; }
 .due-badge.ok { color: var(--accent); }
 .due-badge.soon { color: #b26b00; border-color: rgba(178,107,0,0.35); }
 .due-badge.overdue { color: #ff3b30; border-color: rgba(255,59,48,0.35); }
 .receipt-link { display: inline-block; font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-top: 6px; text-decoration: none; }
 .empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.85rem; }
