
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5c4a3a">
<title>Expenses</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    background: #f5f0eb; color: #3b2e24;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
  }
  .logo { text-align: center; padding: 20px 0 4px; }
  .logo span { font-size: 48px; }
  /* To use your own image logo, replace the <span> in the HTML with:
     <img src="logo.png" alt="Logo" style="width:64px;height:64px;border-radius:16px;"> */
  h1 { font-size: 28px; font-weight: 700; padding: 4px 0 8px; text-align: center; color: #5c4a3a; }
  .total { font-size: 15px; color: #8a7968; padding-bottom: 16px; text-align: center; }
  .total span { color: #5c4a3a; font-weight: 600; }
  .card {
    background: #fff; border-radius: 12px; padding: 16px;
    margin-bottom: 12px; box-shadow: 0 1px 4px rgba(60,46,36,0.08);
  }
  form { display: flex; flex-direction: column; gap: 10px; }
  input, select {
    font-size: 16px; padding: 12px; border: 1px solid #d4c8bc;
    border-radius: 10px; background: #faf7f4; width: 100%;
    color: #3b2e24; -webkit-appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: #8b6f4e; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  button {
    font-size: 16px; font-weight: 600; padding: 12px;
    border: none; border-radius: 10px; cursor: pointer;
    background: #8b6f4e; color: #fff; width: 100%;
  }
  button:active { opacity: 0.7; }
  .expense {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-bottom: 0.5px solid #e8ddd2;
  }
  .expense:last-child { border-bottom: none; }
  .expense-info { flex: 1; }
  .expense-desc { font-size: 16px; font-weight: 500; color: #3b2e24; }
  .expense-meta { font-size: 13px; color: #8a7968; margin-top: 2px; }
  .expense-amount { font-size: 17px; font-weight: 600; margin-right: 12px; color: #5c4a3a; }
  .del-btn {
    background: none; border: none; color: #c0694f; font-size: 22px;
    padding: 4px 8px; width: auto; font-weight: 400;
  }
  .empty { text-align: center; color: #8a7968; padding: 32px 0; font-size: 15px; }
</style>
</head>
<body>
<div class="logo"><img src="logo.png" alt="Logo" style="width:64px;height:64px;border-radius:16px;"></div>
<h1>Expenses</h1>
<div class="total">Total: <span id="total">$0.00</span></div>

<div class="card">
  <form id="form">
    <input id="desc" placeholder="Description" required>
    <div class="row">
      <input id="amount" type="number" step="0.01" min="0" placeholder="Amount" required inputmode="decimal">
      <select id="category">
        <option>Food</option><option>Transport</option><option>Shopping</option>
        <option>Bills</option><option>Entertainment</option><option>Other</option>
      </select>
    </div>
    <input id="date" type="date">
    <button type="submit">Add Expense</button>
  </form>
</div>

<div class="card" id="list-card" style="display:none">
  <div id="list"></div>
</div>
<div class="empty" id="empty">No expenses yet</div>

<script>
const $ = id => document.getElementById(id);
const KEY = "expenses";
$("date").value = new Date().toISOString().split("T")[0];

const load = () => JSON.parse(localStorage.getItem(KEY) || "[]");
const save = d => { localStorage.setItem(KEY, JSON.stringify(d)); render(d); };

function render(data) {
  const total = data.reduce((s, e) => s + parseFloat(e.amount), 0);
  $("total").textContent = `$${total.toFixed(2)}`;
  $("empty").style.display = data.length ? "none" : "block";
  $("list-card").style.display = data.length ? "block" : "none";
  $("list").innerHTML = data.map((e, i) => `
    <div class="expense">
      <div class="expense-info">
        <div class="expense-desc">${esc(e.description)}</div>
        <div class="expense-meta">${esc(e.category)} · ${e.date}</div>
      </div>
      <div class="expense-amount">$${parseFloat(e.amount).toFixed(2)}</div>
      <button class="del-btn" onclick="del(${i})">&times;</button>
    </div>`).join("");
}

function esc(s) {
  const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
}

$("form").onsubmit = e => {
  e.preventDefault();
  const data = load();
  data.unshift({
    description: $("desc").value,
    amount: $("amount").value,
    category: $("category").value,
    date: $("date").value
  });
  save(data);
  $("desc").value = ""; $("amount").value = "";
  $("date").value = new Date().toISOString().split("T")[0];
};

function del(i) {
  const data = load();
  data.splice(i, 1);
  save(data);
}

render(load());
</script>
</body>
</html>
